<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QQZ World</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ===================== CONSTANTS YOU CAN MODIFY =====================
const NUM_PARTICLES = 5000;
const NUM_POPULATIONS = 1;
const MUTATION_CHANCE = 0.1;  // DNA mixing on collision
const WILD_MUTATION_CHANCE = 0.00005;  // fully random mutation on collision
const BASE_SPEED = 0.1;
const LOOKAHEAD_PX = 25;
// ====================================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: false });
if (!gl) { alert('No WebGL'); throw new Error('No WebGL'); }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('Shader compile failed');
  }
  return s;
}

function createProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vsSrc, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fsSrc, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    throw new Error('Program link failed');
  }
  return p;
}

// =================== PASS 1: PRESENCE MAP ===================
// Renders particles into a half-res texture with additive blending.
// R = count, G = color sum, B = size sum, A = speed sum (all scaled).

const presenceVS = `__PRESENCE_VERT__`;

const presenceFS = `__PRESENCE_FRAG__`;

const presenceProg = createProgram(presenceVS, presenceFS);
const u_pres_state = gl.getUniformLocation(presenceProg, 'u_state');
const u_pres_count = gl.getUniformLocation(presenceProg, 'u_count');
const a_pres_index = gl.getAttribLocation(presenceProg, 'a_index');

// =================== PASS 2: UPDATE ===================
// Reads state + presence. 8-dir movement, dodging, collision, mutation.

const updateVS = `__UPDATE_VERT__`;

const updateFS = `__UPDATE_FRAG__`;

const updateProg = createProgram(updateVS, updateFS);
const u_update_state = gl.getUniformLocation(updateProg, 'u_state');
const u_update_presence = gl.getUniformLocation(updateProg, 'u_presence');
const u_update_baseSpeed = gl.getUniformLocation(updateProg, 'u_baseSpeed');
const u_update_resolution = gl.getUniformLocation(updateProg, 'u_resolution');
const u_update_lookahead = gl.getUniformLocation(updateProg, 'u_lookahead');
const u_update_time = gl.getUniformLocation(updateProg, 'u_time');
const u_update_mutationChance = gl.getUniformLocation(updateProg, 'u_mutationChance');
const u_update_wildMutationChance = gl.getUniformLocation(updateProg, 'u_wildMutationChance');
const a_update_pos = gl.getAttribLocation(updateProg, 'a_pos');

// =================== PASS 3: RENDER ===================

const renderVS = `__RENDER_VERT__`;

const renderFS = `__RENDER_FRAG__`;

const renderProg = createProgram(renderVS, renderFS);
const u_render_state = gl.getUniformLocation(renderProg, 'u_state');
const u_render_count = gl.getUniformLocation(renderProg, 'u_count');
const a_render_index = gl.getAttribLocation(renderProg, 'a_index');

// ======================== BUFFERS ========================

const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const indices = new Float32Array(NUM_PARTICLES);
for (let i = 0; i < NUM_PARTICLES; i++) indices[i] = i;
const indexBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, indexBuf);
gl.bufferData(gl.ARRAY_BUFFER, indices, gl.STATIC_DRAW);

// ======================== TEXTURES ========================

const extFloat = gl.getExtension('OES_texture_float');
if (!extFloat) { alert('OES_texture_float required'); throw new Error(); }
gl.getExtension('WEBGL_color_buffer_float');

const texWidth = NUM_PARTICLES;
const texHeight = 1;

const initData = new Float32Array(texWidth * 4);

// Pre-generate N population templates
const populations = [];
for (let p = 0; p < NUM_POPULATIONS; p++) {
  populations.push({
    color: Math.floor(p * 16 / NUM_POPULATIONS), // evenly spaced across palette
    direction: Math.floor(Math.random() * 8),  // 0-7
    size: Math.floor(Math.random() * 8),       // 0-7
    speed: Math.floor(Math.random() * 8),      // 0-7
  });
}

for (let i = 0; i < NUM_PARTICLES; i++) {
  const b = i * 4;
  const pop = populations[i % NUM_POPULATIONS];
  initData[b + 0] = Math.random();                                  // x
  initData[b + 1] = Math.random();                                  // y
  initData[b + 2] = (pop.color * 8 + pop.direction);                // packed color+direction
  initData[b + 3] = (pop.size * 8 + pop.speed);                     // packed size+speed
}

function makeTex(data, w, h, type, filter) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, type, data);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}

function makeFBO(tex) {
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return fbo;
}

// Ping-pong
let texA = makeTex(initData, texWidth, texHeight, gl.FLOAT, gl.NEAREST);
let texB = makeTex(null, texWidth, texHeight, gl.FLOAT, gl.NEAREST);
let fboA = makeFBO(texA);
let fboB = makeFBO(texB);
let readTex = texA, writeFBO = fboB;

function swap() {
  if (readTex === texA) { readTex = texB; writeFBO = fboA; }
  else { readTex = texA; writeFBO = fboB; }
}

// Presence buffer (recreated on resize)
let presW = 0, presH = 0, presTex = null, presFBO = null;

function ensurePresence() {
  const w = Math.ceil(canvas.width / 2);
  const h = Math.ceil(canvas.height / 2);
  if (w === presW && h === presH) return;
  presW = w; presH = h;
  if (presTex) gl.deleteTexture(presTex);
  if (presFBO) gl.deleteFramebuffer(presFBO);
  presTex = makeTex(null, presW, presH, gl.UNSIGNED_BYTE, gl.NEAREST);
  presFBO = makeFBO(presTex);
}

// ======================== LOOP ========================

function frame() {
  ensurePresence();

  // --- Pass 1: Presence ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, presFBO);
  gl.viewport(0, 0, presW, presH);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);

  gl.useProgram(presenceProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, readTex);
  gl.uniform1i(u_pres_state, 0);
  gl.uniform1f(u_pres_count, NUM_PARTICLES);
  gl.bindBuffer(gl.ARRAY_BUFFER, indexBuf);
  gl.enableVertexAttribArray(a_pres_index);
  gl.vertexAttribPointer(a_pres_index, 1, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.POINTS, 0, NUM_PARTICLES);
  gl.disable(gl.BLEND);

  // --- Pass 2: Update ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, writeFBO);
  gl.viewport(0, 0, texWidth, texHeight);

  gl.useProgram(updateProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, readTex);
  gl.uniform1i(u_update_state, 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, presTex);
  gl.uniform1i(u_update_presence, 1);
  gl.uniform1f(u_update_baseSpeed, BASE_SPEED);
  gl.uniform2f(u_update_resolution, canvas.width, canvas.height);
  gl.uniform1f(u_update_lookahead, LOOKAHEAD_PX);
  gl.uniform1f(u_update_time, performance.now() * 0.001);
  gl.uniform1f(u_update_mutationChance, MUTATION_CHANCE);
  gl.uniform1f(u_update_wildMutationChance, WILD_MUTATION_CHANCE);

  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(a_update_pos);
  gl.vertexAttribPointer(a_update_pos, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  swap();

  // --- Pass 3: Draw to screen ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(renderProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, readTex);
  gl.uniform1i(u_render_state, 0);
  gl.uniform1f(u_render_count, NUM_PARTICLES);
  gl.bindBuffer(gl.ARRAY_BUFFER, indexBuf);
  gl.enableVertexAttribArray(a_render_index);
  gl.vertexAttribPointer(a_render_index, 1, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.POINTS, 0, NUM_PARTICLES);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
